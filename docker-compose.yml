services:
  postgres:
    image: postgres:16-alpine
    container_name: docpilot-postgres
    env_file:
      - ./server/.env
    ports:
      - "5433:5432"
    volumes:
      - docpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpilot -d docpilot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docpilot-net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: docpilot-server
    depends_on:
      postgres:
        condition: service_healthy
    # Q-047: env_file is the single source of truth.
    # LLM_*/QWEN_*/SELECT_LLM/POSTGRES_* are read by Spring Boot from
    # env_file-injected vars, resolved through application.yml placeholders
    # (${VAR:default}). Only docker-internal wiring (URL service name + JVM opts)
    # stays as static values here.
    env_file:
      - ./server/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docpilot_db
      SPRING_DATASOURCE_USERNAME: docpilot
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    networks:
      - docpilot-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: docpilot-web
    depends_on:
      - server
    ports:
      - "8081:80"
    networks:
      - docpilot-net

volumes:
  docpilot_pgdata:

networks:
  docpilot-net:
    driver: bridge
