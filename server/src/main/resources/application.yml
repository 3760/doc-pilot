# ========================================
# DocPilot Server 基础配置
# ========================================

spring:
  application:
    name: docpilot-server

  profiles:
    active: default  # 默认 5433端口连docker container；dev profile 仅供直连容器时使用

  # 数据源配置（开发环境）
  # 端口 5433 是 host 端口（Docker 内 PostgreSQL 还是 5432）
  # 原因：宿主机 PostgreSQL 已占用 5432，所以 docker-compose 用 5433 → 5432 映射
  datasource:
    url: jdbc:postgresql://127.0.0.1:5433/docpilot_db
    username: docpilot
    password: ${POSTGRES_PASSWORD:docpil_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 快速失败：PG 不可用时不应 hang 住太久（默认 30s）
      connection-timeout: 3000      # 3s
      validation-timeout: 2000      # 2s
      initialization-fail-timeout: -1  # 不阻止启动（PG 暂时不可用）

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 验证 schema，不自动创建
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# LangChain4j 配置
langchain4j:
  # Anthropic Claude（生产）
  # anthropic:
  #   api-key: ${ANTHROPIC_API_KEY}
  #   model-name: claude-3-5-sonnet-20241022
  #   max-tokens: 4096
  #   temperature: 0.7

  # OpenAI 兼容（开发 - 使用 minimax）
  # 国内官方接口：https://api.minimaxi.com/v1（OpenAI Chat Completions 兼容）
  # 海外接口：https://api.minimax.io/v1
  open-ai:
    chat-model:
      base-url: ${LLM_BASE_URL:https://api.minimaxi.com/v1}
      api-key: ${LLM_API_KEY:sk-placeholder-replace-me}
      model-name: ${LLM_MODEL:MiniMax-M3}
      temperature: 0.7
      max-tokens: 4096
      timeout: 60s

  # Fallback LLM（Qwen - 通义千问，设计 04 § 11.4）
  # 启用方式：SELECT_LLM=qwen + QWEN_ENABLED=true
  qwen:
    enabled: ${QWEN_ENABLED:false}
    base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${QWEN_API_KEY:sk-qwen-placeholder}
    model-name: ${QWEN_MODEL:qwen-plus}
    temperature: 0.7
    max-tokens: 4096
    timeout: 60s

# LLM 主备选择（设计 04 § 11.4）
llm:
  primary: ${SELECT_LLM:m3}  # m3 | qwen

# 服务器配置
server:
  port: 8080
  compression:
    enabled: true
  servlet:
    encoding:
      charset: UTF-8
      force: true

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# 日志配置
logging:
  level:
    root: INFO
    com.docpilot: DEBUG
    org.springframework.web: INFO
    dev.langchain4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
