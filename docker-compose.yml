# ========================================
# DocPilot Docker Compose
# ========================================
# 用于本地开发环境
# 启动：docker compose up -d
# 停止：docker compose down
# ========================================

version: "3.9"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: docpilot-postgres
    environment:
      POSTGRES_DB: docpilot_db
      POSTGRES_USER: docpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpilot_dev_password}
    ports:
      - "5433:5432"  # host 5433 → container 5432（避开宿主机 PostgreSQL 端口冲突）
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./server/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docpilot-net

  # Redis（缓存 + 会话存储，Phase 2 启用）
