  #     DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-docpilot_dev_password}
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - docpilot-net

  # Vue 3 前端（待 web/ 实施后启用）
  # web:
  #   build:
  #     context: ./web
  #   container_name: docpilot-web
  #   ports:
  #     - "5173:5173"
  #   networks:
  #     - docpilot-net

volumes:
  postgres-data:
    name: docpilot-postgres-data
  # redis-data:
