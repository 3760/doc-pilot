# ========================================
# DocPilot 标准周报模板 (v2.1)
# ========================================
# 对应 ADR 0013 模板系统 3 子能力
# 文件加载：TemplateLoader.java 启动时扫描此 YAML
# 版本演进：v1 (2026-07-14) → v2 (2026-07-15 ADR 0013) → v2.1 (2026-07-16 增强)
#   v2.1 新增：追问轮数限制、metadata 元信息、template_hints、示例数据
# ========================================

# ===== 模板元信息（新增 v2.1） =====
metadata:
  templateId: weekly-report-standard
  version: "2.1"
  author: 虾仔
  createdAt: "2026-07-14"
  updatedAt: "2026-07-16"
  changelog:
    - "v2.1: 新增追问轮数限制、metadata、template_hints、sample"
    - "v2.0: 拆 3 子能力 (ADR 0013)"
    - "v1.0: 初始版本（模糊 AI 对话引导配置）"
  applicableRoles:
    - 项目总监
    - PM
    - 部门经理

# ===== 子能力 4.1：输入结构 =====
# 决定每章节要收集什么信息
# 消费者：功能 1 模式 A「AI 拆解」—— 按此结构提取信息
inputStructure:
  - id: project_info
    title: 项目基本信息
    type: form
    required: true
    fields:
      - id: project_name
        label: 项目名称
        type: text
        required: true
        placeholder: 如：人保三期 NPS
      - id: report_period
        label: 报告周期
        type: date_range
        required: true
        autoFill: current_week
      - id: reporter
        label: 汇报人
        type: user
        required: true
        autoFill: current_user
      - id: project_stage
        label: 项目阶段
        type: select
        required: false
        options:
          - 启动
          - 规划
          - 执行
          - 收尾

  - id: completed
    title: 本周完成事项
    type: list
    required: true
    fields:
      - id: work_items
        label: 工作事项
        type: text
        required: true
      - id: completion_status
        label: 完成状态
        type: select
        required: true
        options:
          - 已完成
          - 进行中
          - 延期
          - 取消
      - id: progress
        label: 进度
        type: text
        required: false
        placeholder: 如：80% 或 已完成测试
      - id: notes
        label: 备注
        type: textarea
        required: false

  - id: planned
    title: 下周计划
    type: list
    required: true
    fields:
      - id: plan_items
        label: 计划事项
        type: text
        required: true
      - id: priority
        label: 优先级
        type: select
        required: true
        options:
          - 高
          - 中
          - 低
      - id: expected_outcome
        label: 预期产出
        type: text
        required: false

  - id: risks
    title: 风险与支持
    type: textarea
    required: false
    fields:
      - id: risks_and_issues
        label: 风险与问题
        type: textarea
        required: false
      - id: needs_support
        label: 需要支持
        type: textarea
        required: false

# ===== 子能力 4.2：追问清单 =====
# 决定每章节要追问什么
# 消费者：模式 A 拆解后的信息缺口追问 / 模式 B 上周计划追问 / 模式 C 冷启动
followupQuestions:
  - sectionId: project_info
    maxRounds: 3  # 新增 v2.1：必填章节 3 轮追问上限
    questions:
      - "项目当前阶段是否有变化？"
      - "本期是否有重要里程碑？"
      - "项目干系人是否有变动？"

  - sectionId: completed
    maxRounds: 3
    questions:
      - "完成的工作量如何量化？"
      - "有没有遇到卡点？"
      - "是否需要调整计划？"

  - sectionId: planned
    maxRounds: 3
    questions:
      - "下周优先级最高的事项是？"
      - "预期产出如何衡量？"
      - "是否有依赖外部的事项？"

  - sectionId: risks
    maxRounds: 1  # 新增 v2.1：可选章节 1 轮追问上限
    questions:
      - "需要的支持具体是什么？"
      - "影响范围多大？何时必须解决？"

# 追问超出后处理（新增 v2.1）
# 必填章节超出 maxRounds：自动生成完整周报，标注「信息不完整」
# 可选章节超出 maxRounds：自动跳过该章节
followupOverflowPolicy:
  required: auto_generate_with_warning
  optional: auto_skip

# ===== 子能力 4.3：输出格式 =====
# 决定 HTML 周报长什么样
# 消费者：功能 3「HTML 导出」—— 渲染时按此格式生成
outputFormat:
  templateHtml: weekly-report-template.vue
  sectionsOrder:
    - project_info
    - completed
    - planned
    - risks
  style:
    theme: professional
    primaryColor: "#1DAFAD"   # Ipsos 青绿
    font: "Microsoft YaHei"  # 系统中文字体
  richTextRules:
    maxImages: 5
    maxImageSizeMb: 2
    maxTableRows: 20
  charts:
    enabled: true
    types:
      - progress_bar     # 进度条
      - completion_pie   # 完成度饼图
      - priority_bar     # 优先级柱状图

# ===== 模板提示（新增 v2.1） =====
# 供前端和 AI LLM 使用的元提示
templateHints:
  shortDescription: "标准周报 - 4 章节"
  longDescription: "项目总监周报模板，含 4 个章节（项目基本信息、本周完成、下周计划、风险与支持）。适用于项目总监、PM、部门经理。"
  estimatedCompletionTime: "20-40 秒"
  requiredSectionsCount: 3  # project_info / completed / planned
  optionalSectionsCount: 1  # risks
  totalFollowupQuestionsCount: 11
  bestFor:
    - 每周固定汇报
    - 跨项目并行管理
    - 团队工作透明化

# ===== 示例数据（新增 v2.1） =====
